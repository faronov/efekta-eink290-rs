name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + thumbv7em target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: clippy, rustfmt, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --release

      - name: Clippy
        run: cargo clippy --release -- -D warnings

      - name: Format
        run: cargo fmt -- --check

      - name: Build release (app)
        run: cargo build --release

      - name: Build bootloader
        run: cargo build --release --manifest-path bootloader/Cargo.toml

      - name: Install cargo-binutils
        run: cargo install cargo-binutils

      - name: Generate hex, bin, merged hex, and OTA
        run: |
          APP_ELF=target/thumbv7em-none-eabihf/release/efekta-eink290-rs
          BOOT_ELF=bootloader/target/thumbv7em-none-eabihf/release/efekta-bootloader

          # App hex/bin
          rust-objcopy -O ihex   "$APP_ELF"  "$APP_ELF.hex"
          rust-objcopy -O binary "$APP_ELF"  "$APP_ELF.bin"

          # Bootloader hex
          rust-objcopy -O ihex   "$BOOT_ELF" "$BOOT_ELF.hex"

          # Merge bootloader + app into single hex for factory flashing
          # srec_cat merges non-overlapping Intel HEX files
          pip install intelhex
          python3 -c "
          from intelhex import IntelHex
          boot = IntelHex('$BOOT_ELF.hex')
          app  = IntelHex('$APP_ELF.hex')
          boot.merge(app)
          boot.write_hex_file('$APP_ELF-merged.hex')
          print('Merged hex: boot + app')
          "

          # Extract version from Cargo.toml for OTA package
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          OTA_VER=$(printf "0x%02X%02X%04X" "$MAJOR" "$MINOR" "$PATCH")
          echo "Cargo.toml version: $VERSION → OTA version: $OTA_VER"

          # OTA .zigbee package (app only, no bootloader)
          python3 scripts/make_ota.py "$APP_ELF.bin" "$APP_ELF.zigbee" \
            --manufacturer 0x1234 --image-type 0x0001 \
            --version "$OTA_VER" --string "Efekta EInk290 nRF52840 v$VERSION"

          echo "=== Sizes ==="
          rust-size "$APP_ELF"
          rust-size "$BOOT_ELF"
          ls -lh "$APP_ELF.hex" "$APP_ELF.bin" "$APP_ELF-merged.hex" "$APP_ELF.zigbee" "$BOOT_ELF.hex"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: efekta-eink290-firmware
          path: |
            target/thumbv7em-none-eabihf/release/efekta-eink290-rs
            target/thumbv7em-none-eabihf/release/efekta-eink290-rs.hex
            target/thumbv7em-none-eabihf/release/efekta-eink290-rs.bin
            target/thumbv7em-none-eabihf/release/efekta-eink290-rs-merged.hex
            target/thumbv7em-none-eabihf/release/efekta-eink290-rs.zigbee
            bootloader/target/thumbv7em-none-eabihf/release/efekta-bootloader.hex

  build-uart-debug:
    name: Build UART debug firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + thumbv7em target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          key: uart-debug

      - name: Clippy (uart-debug)
        run: cargo clippy --features uart-debug -- -D warnings

      - name: Build release (uart-debug)
        run: cargo build --release --features uart-debug

      - name: Install cargo-binutils
        run: cargo install cargo-binutils

      - name: Generate hex and bin
        run: |
          ELF=target/thumbv7em-none-eabihf/release/efekta-eink290-rs
          rust-objcopy -O ihex   "$ELF" "$ELF-uart-debug.hex"
          rust-objcopy -O binary "$ELF" "$ELF-uart-debug.bin"
          cp "$ELF" "$ELF-uart-debug.elf"
          ls -lh "$ELF-uart-debug.elf" "$ELF-uart-debug.hex" "$ELF-uart-debug.bin"

      - name: Upload uart-debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: efekta-eink290-uart-debug
          path: |
            target/thumbv7em-none-eabihf/release/efekta-eink290-rs-uart-debug.elf
            target/thumbv7em-none-eabihf/release/efekta-eink290-rs-uart-debug.hex
            target/thumbv7em-none-eabihf/release/efekta-eink290-rs-uart-debug.bin
